<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunday Science - Biotech Healthcare Iberia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Source+Sans+3:ital,wght@0,300;0,400;0,700;1,300&display=swap');
        
        body {
            font-family: 'Source Sans 3', sans-serif; /* Tipografía oficial Biotech  */
            background-color: #05161f;
            color: white;
            margin: 0;
            overflow-x: hidden;
        }

        .glass-card { 
            background: rgba(15, 41, 51, 0.85); 
            backdrop-filter: blur(24px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }

        .timer-bar { animation: progress-timer linear forwards; }
        @keyframes progress-timer { 0% { width: 100%; } 100% { width: 0%; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [step, setStep] = useState('welcome');
            const [score, setScore] = useState(0);
            const [userName, setUserName] = useState('');
            const canvasRef = useRef(null);

            const getRank = () => {
                const ranks = [
                    { title: "Vítreo en Suspensión", emoji: "🫠", color: "#94a3b8", desc: "Estado líquido total. Vuelve a la cama, hoy no es tu día." },
                    { title: "Miope de Domingo", emoji: "☕", color: "#f87171", desc: "Necesitas una corrección de -10 dioptrías y tres cafés bien cargados." },
                    { title: "R1 en Fase de Carga", emoji: "🔋", color: "#fb923c", desc: "Procesando... El cerebro todavía está en modo fin de semana." },
                    { title: "Visionario del Vermú", emoji: "🍸", color: "#60BFB6", desc: "Tienes buena vista, pero el aperitivo te está llamando fuerte." },
                    { title: "Catedrático del Domingo", emoji: "🛋️", color: "#806FA6", desc: "Casi perfecto. Dominas la teoría incluso desde el sofá." },
                    { title: "Oftalmo-Lord de la Galaxia", emoji: "🪐", color: "#054159", desc: "Nivel: Dios del MIR. Tu retina no es de este mundo." }
                ];
                return ranks[score];
            };

            const downloadCertificate = () => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const rank = getRank();
                
                // Fondo Blanco
                ctx.fillStyle = '#FFFFFF';
                ctx.fillRect(0, 0, 1123, 794); // Formato A4 Horizontal en px

                // Marco Navy 
                ctx.strokeStyle = '#054159';
                ctx.lineWidth = 30;
                ctx.strokeRect(40, 40, 1043, 714);

                // Título Principal
                ctx.textAlign = 'center';
                ctx.fillStyle = '#054159';
                ctx.font = 'bold 38px Montserrat';
                ctx.fillText('SUNDAY SCIENCE CERTIFICATION', 561, 130);

                // Subtítulo Italic
                ctx.font = 'italic 24px "Source Sans 3"';
                ctx.fillStyle = '#666666';
                ctx.fillText('Mención Especial por preferir un Test MIR a la siesta', 561, 180);

                // Nombre del Usuario
                ctx.font = 'bold 65px Montserrat';
                ctx.fillStyle = '#054159';
                ctx.fillText(userName.toUpperCase() || 'HÉROE DEL MIR', 561, 320);

                // Rango
                ctx.font = '30px "Source Sans 3"';
                ctx.fillStyle = '#333333';
                ctx.fillText('Ha alcanzado el rango de:', 561, 390);

                ctx.font = 'bold 55px Montserrat';
                ctx.fillStyle = '#60BFB6'; // Color Teal Biotech 
                ctx.fillText(rank.title.toUpperCase(), 561, 460);

                // Puntuación
                ctx.font = '22px "Source Sans 3"';
                ctx.fillStyle = '#999999';
                ctx.fillText(`Puntuación: ${score}/5 aciertos en el MIR 2026`, 561, 530);

                // Cita Inferior
                ctx.font = 'italic 20px "Source Sans 3"';
                ctx.fillStyle = '#666666';
                ctx.fillText('"Diagnóstico realizado con éxito bajo los efectos del domingo"', 561, 610);

                // Footer 
                ctx.font = 'bold 18px Montserrat';
                ctx.fillStyle = '#054159';
                ctx.fillText('BIOTECH HEALTHCARE IBERIA - INNOVATION IN VISION', 561, 710);

                // Descarga
                const link = document.createElement('a');
                link.download = `SundayScience_Horizontal_${userName}.png`;
                link.href = canvas.toDataURL();
                link.click();
            };

            // Para simplificar la visualización en el paso 'certificate'
            if (step === 'certificate') {
                return (
                    <div className="flex flex-col items-center justify-center p-6 animate-fadeIn">
                        <div className="bg-white p-4 shadow-2xl rounded-lg max-w-4xl w-full border-2 border-slate-200">
                             {/* Vista previa horizontal del diploma */}
                             <div className="aspect-[1.414/1] bg-white border-[12px] border-[#054159] p-8 flex flex-col items-center justify-between text-[#054159]">
                                <div className="text-center">
                                    <h1 className="text-2xl font-bold tracking-widest font-montserrat">SUNDAY SCIENCE CERTIFICATION</h1>
                                    <p className="italic text-slate-500 mt-2 font-light">Mención Especial por preferir un Test MIR a la siesta</p>
                                </div>
                                
                                <div className="text-center">
                                    <h2 className="text-5xl font-black mb-4 font-montserrat tracking-tight">{userName || 'USUARIO'}</h2>
                                    <p className="text-xl text-slate-700">Ha alcanzado el rango de:</p>
                                    <p className="text-4xl font-bold text-[#60BFB6] mt-2 font-montserrat">{getRank().title.toUpperCase()}</p>
                                    <p className="text-slate-400 mt-4">Puntuación: {score}/5 aciertos en el MIR 2026</p>
                                </div>

                                <div className="text-center w-full">
                                    <p className="italic text-slate-500 mb-8 font-light text-sm">"Diagnóstico realizado con éxito bajo los efectos del domingo"</p>
                                    <p className="font-bold text-sm tracking-tighter border-t border-slate-100 pt-4">BIOTECH HEALTHCARE IBERIA - INNOVATION IN VISION</p>
                                </div>
                             </div>
                        </div>

                        <canvas ref={canvasRef} width="1123" height="794" className="hidden" />
                        
                        <div className="mt-8 flex gap-4">
                            <button onClick={downloadCertificate} className="bg-[#60BFB6] hover:bg-[#4eb1a8] text-[#054159] font-black py-4 px-8 rounded-2xl flex items-center gap-3 shadow-xl transition-all">
                                <Icon name="download" /> DESCARGAR PNG HORIZONTAL
                            </button>
                            <button onClick={() => setStep('welcome')} className="bg-white/10 hover:bg-white/20 py-4 px-8 rounded-2xl font-bold transition-all">
                                REINTENTAR
                            </button>
                        </div>
                    </div>
                );
            }

            // ... (Resto del código de bienvenida y lógica de Quiz similar al anterior)
            return (
                <div className="text-center p-10 glass-card rounded-[3rem] max-w-xl">
                    <h1 className="text-4xl font-bold mb-8">Sunday Science</h1>
                    <input 
                        type="text" 
                        placeholder="Introduce tu nombre" 
                        className="w-full p-4 mb-6 rounded-xl bg-black/20 border border-white/10 text-center text-xl"
                        onChange={(e) => setUserName(e.target.value)}
                    />
                    <button 
                        onClick={() => { setScore(1); setStep('certificate'); }}
                        className="w-full bg-[#60BFB6] text-[#054159] font-black py-5 rounded-2xl text-2xl"
                    >
                        ¿ACEPTAS EL RETO?
                    </button>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
